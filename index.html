function fmtNum(v){if(v==null||v==='')return'—';const n=Number(v);if(isNaN(n))return String(v);return n.toLocaleString();}
function fmtDate(v){if(!v)return'—';return new Date(v+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtSF(v){if(!v||v===0)return'—';if(v>=1000000)return(v/1000000).toFixed(2)+'M SF';if(v>=1000)return Math.round(v/1000)+'K SF';return v.toLocaleString()+' SF';}
function newId(){return'lab_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}

function MultiSelect({label,options,selected,onToggle,onClear,isOpen,onOpen}){
  const hasVal=selected.length>0;
  const btnLabel=hasVal?(selected.length===1?selected[0]:selected.length+' selected'):label;
  return(
    <div data-dropdown style={{position:'relative',flex:'1 1 120px',maxWidth:180}}>
      <button onClick={onOpen} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',background:'#fff',border:'1px solid '+(hasVal?'#0369a1':'#e2e8f0'),borderRadius:8,padding:'8px 12px',cursor:'pointer',transition:'border-color .15s',fontFamily:'inherit'}}>
        <span style={{fontSize:13,color:hasVal?'#0369a1':'#94a3b8',fontWeight:hasVal?600:400,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{btnLabel}</span>
        <span style={{color:'#94a3b8',fontSize:10,marginLeft:6,flexShrink:0}}>{isOpen?'▲':'▼'}</span>
      </button>
      {isOpen&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:300,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.1)',minWidth:200,maxHeight:280,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'8px 12px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</span>
            {hasVal&&<button onClick={onClear} style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',padding:0}}>Clear</button>}
          </div>
          <div style={{overflowY:'auto',maxHeight:220}}>
            {options.map(o=>{
              const val=typeof o==='string'?o:o.value;
              const lbl=typeof o==='string'?o:o.label;
              const on=selected.includes(val);
              return(
                <div key={val} onClick={()=>onToggle(val)}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',background:on?'#f0f9ff':'transparent',transition:'background .1s'}}>
                  <div style={{width:16,height:16,borderRadius:4,border:'1.5px solid '+(on?'#0369a1':'#cbd5e1'),background:on?'#0369a1':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {on&&<span style={{color:'#fff',fontSize:10,fontWeight:700,lineHeight:1}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:on?'#0369a1':'#334155',fontWeight:on?500:400}}>{lbl}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function StackedBar({data,maxVal}){
  if(!maxVal)return<div style={{height:8,background:'#e2e8f0',borderRadius:4}}/>;
  return(<div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',background:'#e2e8f0'}}>{data.filter(d=>d.value>0).map(d=>(<div key={d.key} title={d.label+': '+fmtSF(d.value)} style={{width:(d.value/maxVal*100)+'%',background:d.color,minWidth:2}}/>))}</div>);
}

function PieChart({data,size=200}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return<div style={{width:size,height:size,borderRadius:'50%',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#94a3b8'}}>No data</div>;
  let angle=-Math.PI/2;
  const slices=data.filter(d=>d.value>0).map(d=>{
    const start=angle;
    const sweep=(d.value/total)*Math.PI*2;
    angle+=sweep;
    const x1=Math.cos(start),y1=Math.sin(start);
    const x2=Math.cos(start+sweep),y2=Math.sin(start+sweep);
    const large=sweep>Math.PI?1:0;
    const r=size/2-2,cx=size/2,cy=size/2;
    return{...d,path:`M${cx},${cy} L${cx+x1*r},${cy+y1*r} A${r},${r},0,${large},1,${cx+x2*r},${cy+y2*r} Z`};
  });
  return(
    <svg width={size} height={size} style={{display:'block'}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth={1.5}><title>{s.label}: {fmtSF(s.value)} ({Math.round(s.value/total*100)}%)</title></path>)}
    </svg>
  );
}

  const [activeCities,setActiveCities]=useState([]);     // [] = all

  // Switch to county view clears city filter; switch to city view clears county filter
  const switchView=v=>{setDview(v);setActiveCounties([]);setActiveCities([]);};

  const allCounties=COUNTIES;

  const availCities=activeCounties.length
    ? DASH_DATA.cities.filter(r=>activeCounties.includes(r.county)).map(r=>r.city)
    : CITIES;

  // Base rows depending on view
  const baseRows=dview==='city'?DASH_DATA.cities:DASH_DATA.counties;
  // Apply county/city filters to rows
  const rows=baseRows.filter(r=>{
    if(dview==='county'&&activeCounties.length&&!activeCounties.includes(r.county))return false;
    if(dview==='city'){
      if(activeCounties.length&&!activeCounties.includes(r.county))return false;
      if(activeCities.length&&!activeCities.includes(r.city))return false;
    }
    return true;
  });
  const nameKey=dview==='city'?'city':'county';
  const allSelected=activeCats.size===allCatKeys.length;

  const toggleCat=key=>{
    setActiveCats(prev=>{
      if(prev.size===allCatKeys.length) return new Set([key]);
      const n=new Set(prev);
      if(n.has(key)){n.delete(key);if(n.size===0)return new Set(allCatKeys);}
      else{n.add(key);if(n.size===allCatKeys.length)return new Set(allCatKeys);}
      return n;
    });
  };

  const toggleCounty=c=>{
    setActiveCounties(prev=>{
      const next=prev.includes(c)?prev.filter(x=>x!==c):[...prev,c];
      // Clear cities that no longer belong to selected counties
      if(next.length>0) setActiveCities(ac=>ac.filter(city=>next.includes(CITY_COUNTY[city])));
      else setActiveCities([]);
      return next;
    });
  };

  const toggleCity=c=>setActiveCities(prev=>prev.includes(c)?prev.filter(x=>x!==c):[...prev,c]);

function AIQueryTab({listings}){
  const [messages,setMessages]=useState([]);

  const bottomRef=useState(null);

  const EXAMPLE_QUESTIONS=[
    'Which cities have the most direct SF available?',

    'What is the average asking price in San Mateo County?',
    'Find subleases under 10,000 SF available immediately',

  async function ask(question){
    if(!question.trim()||loading)return;
    const userMsg={role:'user',content:question};
    const newMessages=[...messages,userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try{
      // Build a compact data summary covering ALL listings
      const summary=listings.map(r=>
        [r.city,r.landlord||'',r.streetAddress||r.projectName||'',r.sqftDirect||0,r.sqftSublease||0,r.pricingGuidance||'',r.leaseType||'',r.facilityFeatures||'',r.deliveryTiming||''].join('|')
      ).join('\n');

      const systemPrompt=`You are an expert commercial real estate analyst for Bay Area life science lab space. You have access to ALL ${listings.length} Bay Area lab space listings in the database. Data format (pipe-delimited): city|landlord|address|direct_sf|sublease_sf|price_per_sf|lease_type|facility_features|delivery\n\nFULL DATABASE:\n${summary}\n\nAnswer questions accurately using this complete data. Format numbers with commas. Use bullet points when listing properties. Be concise and specific.`;

      const response=await fetch('/api/news',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:2000,
          system:systemPrompt,
          messages:newMessages.map(m=>({role:m.role,content:m.content}))
        })
      });

      const data=await response.json();
      if(data.error)throw new Error(data.error.message||'API error');
      const reply=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      setMessages([...newMessages,{role:'assistant',content:reply}]);
    }catch(err){
      setMessages([...newMessages,{role:'assistant',content:'Sorry, I encountered an error: '+err.message}]);
    }
    setLoading(false);
  }

  return(
    <div>
      {/* Chat messages */}
      <div style={{minHeight:300,maxHeight:500,overflowY:'auto',marginBottom:16,display:'flex',flexDirection:'column',gap:12}}>
        {messages.length===0&&(
          <div>
            <div style={{fontSize:13,color:'#64748b',marginBottom:12}}>Try asking:</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {EXAMPLE_QUESTIONS.map((q,i)=>(
                <button key={i} onClick={()=>ask(q)}
                  style={{padding:'8px 14px',fontSize:12,borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',color:'#475569',cursor:'pointer',textAlign:'left',fontFamily:'inherit',transition:'all .15s'}}>
                  {q}
                </button>
              ))}
            </div>
          </div>
        )}

        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{
              maxWidth:'85%',padding:'12px 16px',borderRadius:12,fontSize:13,lineHeight:1.6,
              background:m.role==='user'?'#0369a1':'#fff',
              color:m.role==='user'?'#fff':'#334155',
              border:m.role==='user'?'none':'1px solid #e2e8f0',
              borderBottomRightRadius:m.role==='user'?4:12,
              borderBottomLeftRadius:m.role==='assistant'?4:12,
              whiteSpace:'pre-wrap'
            }}>
              {m.content}
            </div>
          </div>
        ))}

        {loading&&(
          <div style={{display:'flex',justifyContent:'flex-start'}}>
            <div style={{padding:'12px 16px',borderRadius:12,background:'#fff',border:'1px solid #e2e8f0',color:'#94a3b8',fontSize:13}}>
              Analyzing {listings.length} listings…
            </div>
          </div>
        )}
      </div>

      {/* Input */}
      <div style={{display:'flex',gap:8}}>
        <input
          className="ifield"
          style={{flex:1,fontSize:13}}
          placeholder="Ask anything about the listings…"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask(input);}}}
          disabled={loading}
        />
        <button
          onClick={()=>ask(input)}
          disabled={loading||!input.trim()}
          style={{padding:'8px 20px',fontSize:13,fontWeight:600,borderRadius:8,border:'none',background:'#0369a1',color:'#fff',cursor:'pointer',fontFamily:'inherit',opacity:(loading||!input.trim())?0.5:1}}>
          Ask
        </button>
        {messages.length>0&&(
          <button onClick={()=>setMessages([])} className="btn btn-ghost" style={{fontSize:12}}>Clear</button>
        )}
      </div>
      <div style={{fontSize:11,color:'#94a3b8',marginTop:8}}>Press Enter to send · Each query uses a small amount of API credits</div>
    </div>
  );
}

// ─── Absorption Tab ───────────────────────────────────────────────────────────
const ABSORPTION_STORAGE_KEY='labmatrix_absorption_v1';

function AbsorptionTab(){
  const [records,setRecords]=useState(()=>{try{const s=localStorage.getItem(ABSORPTION_STORAGE_KEY);return s?JSON.parse(s):[];}catch{return [];}});
  const [sort,setSort]=useState({field:'dateEntered',dir:'desc'});
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(1);
  const [openDropdown,setOpenDropdown]=useState(null);
  const [filters,setFilters]=useState({county:[],city:[],leaseType:[]});
  const PAGE_SIZE=50;

  const persist=data=>{try{localStorage.setItem(ABSORPTION_STORAGE_KEY,JSON.stringify(data));}catch{}};

  const filtered=records.filter(r=>{
    if(filters.county.length&&!filters.county.includes(CITY_COUNTY[r.city]))return false;
    if(filters.city.length&&!filters.city.includes(r.city))return false;
    if(filters.leaseType.length&&!filters.leaseType.includes(r.leaseType))return false;
    if(search){const s=search.toLowerCase();if(![r.tenant,r.landlord,r.address,r.city,r.project].filter(Boolean).join(' ').toLowerCase().includes(s))return false;}
    return true;
  }).sort((a,b)=>{
    const COUNTY_ORDER={'San Francisco':0,'San Mateo':1,'Santa Clara':2,'Alameda':3};
    const aO=COUNTY_ORDER[CITY_COUNTY[a.city]]??99,bO=COUNTY_ORDER[CITY_COUNTY[b.city]]??99;
    if(aO!==bO)return aO-bO;
    let av=a[sort.field]??'',bv=b[sort.field]??'';
    if(av<bv)return sort.dir==='asc'?-1:1;if(av>bv)return sort.dir==='asc'?1:-1;return 0;
  });

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const paginated=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const toggleSort=f=>setSort(s=>s.field===f?{field:f,dir:s.dir==='asc'?'desc':'asc'}:{field:f,dir:'asc'});
  const toggleFilter=(k,v)=>setFilters(f=>{const arr=f[k];const next=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];return{...f,[k]:next};});

  const cols=[
    ['dateEntered','Date'],['tenant','Tenant'],['landlord','Landlord'],
    ['project','Project Name'],['address','Address'],['city','City'],
    ['sqft','SF'],['leaseType','Lease Type'],['askingRent','Asking Rent'],
    ['dealRent','Deal Rent'],['term','Term'],['tia','TIA'],
    ['deliveryDate','Delivery'],['comments','Comments'],
  ];

  useEffect(()=>{
    if(!openDropdown)return;
    const close=e=>{if(!e.target.closest('[data-abs-dropdown]'))setOpenDropdown(null);};
    document.addEventListener('mousedown',close);
    return()=>document.removeEventListener('mousedown',close);
  },[openDropdown]);

  function exportCSV(){
    const hdrs=cols.map(([,l])=>l);
    const blob=new Blob([[hdrs.join(','),...filtered.map(r=>cols.map(([k])=>'"'+(r[k]??'').toString().replace(/"/g,'""')+'"').join(','))].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='absorption.csv';a.click();
  }

  const leaseTypes=[...new Set(records.map(r=>r.leaseType).filter(Boolean))];

  return(
    <div style={{maxWidth:1600}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:'#0f172a',marginBottom:4}}>Absorption</h1>
          <p style={{fontSize:13,color:'#64748b'}}>{records.length} records · {filtered.length} showing</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={exportCSV} className="btn btn-ghost">↓ Export</button>
          <button className="btn btn-success" onClick={()=>{
            const tenant=prompt('Tenant name:');if(!tenant)return;
            const address=prompt('Address:');
            const city=prompt('City:');
            const sqft=prompt('SF leased:');
            const leaseType=prompt('Lease type (NNN/FS/etc):');
            const askingRent=prompt('Asking rent ($/SF):');
            const dealRent=prompt('Deal rent ($/SF):');
            const tia=prompt('TIA ($/SF):');
            const term=prompt('Lease term (months):');
            const landlord=prompt('Landlord:');
            const project=prompt('Project name:');
            const comments=prompt('Comments:');
            const rec={id:'abs_'+Date.now(),dateEntered:new Date().toISOString().slice(0,10),tenant,address,city,sqft,leaseType,askingRent,dealRent,tia,term,landlord,project,comments};
            const updated=[...records,rec];
            setRecords(updated);persist(updated);
          }}>+ Add Record</button>
        </div>
      </div>

      {/* Filter bar */}
      <div className="card" style={{padding:'10px 14px',marginBottom:12,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',flex:'0 0 220px'}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#94a3b8',fontSize:14}}>🔍</span>
          <input className="ifield" style={{paddingLeft:32}} placeholder="Search tenant, landlord, address…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
        </div>

        {[{key:'county',opts:COUNTIES,ph:'County'},{key:'city',opts:CITIES,ph:'City'},{key:'leaseType',opts:leaseTypes,ph:'Lease Type'}].map(({key,opts,ph})=>(
          <div key={key} data-abs-dropdown style={{position:'relative'}}>
            <button onClick={()=>setOpenDropdown(o=>o===key?null:key)}
              style={{padding:'7px 12px',fontSize:12,fontWeight:500,borderRadius:8,border:'1px solid '+(filters[key].length?'#0369a1':'#e2e8f0'),background:filters[key].length?'#e0f2fe':'#fff',color:filters[key].length?'#0369a1':'#475569',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:'inherit',whiteSpace:'nowrap'}}>
              {filters[key].length?`${ph}: ${filters[key].length} selected`:ph} <span style={{fontSize:9}}>{openDropdown===key?'▲':'▼'}</span>
            </button>
            {openDropdown===key&&(
              <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:300,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.1)',minWidth:180,maxHeight:260,overflow:'auto'}}>
                <div style={{padding:'6px 12px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase'}}>{ph}</span>
                  {filters[key].length>0&&<button onClick={()=>setFilters(f=>({...f,[key]:[]}))} style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}}>Clear</button>}
                </div>
                {opts.map(o=>{const on=filters[key].includes(o);return(
                  <div key={o} onClick={()=>{toggleFilter(key,o);setPage(1);}} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',background:on?'#f0f9ff':'transparent'}}>
                    <div style={{width:16,height:16,borderRadius:4,border:'1.5px solid '+(on?'#0369a1':'#cbd5e1'),background:on?'#0369a1':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {on&&<span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:13,color:on?'#0369a1':'#334155'}}>{o}</span>
                  </div>
                );})}
              </div>
            )}
          </div>
        ))}

        {(search||Object.values(filters).some(f=>f.length))&&(
          <button className="btn btn-ghost btn-sm" onClick={()=>{setFilters({county:[],city:[],leaseType:[]});setSearch('');setPage(1);}}>✕ Clear</button>
        )}

        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:'#94a3b8',whiteSpace:'nowrap'}}>{filtered.length} results</span>
          {totalPages>1&&(<>
            <div style={{width:1,height:14,background:'#e2e8f0'}}/>
            <button className="btn btn-ghost btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)} style={{padding:'3px 8px',fontSize:13}}>←</button>
            <span style={{fontSize:12,color:'#64748b',whiteSpace:'nowrap'}}>{page} / {totalPages}</span>
            <button className="btn btn-ghost btn-sm" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)} style={{padding:'3px 8px',fontSize:13}}>→</button>
          </>)}
        </div>
      </div>

      {/* Table */}
      <div className="card" style={{overflow:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#f8fafc'}}>
            {cols.map(([f,l])=>(
              <th key={f} className="th" onClick={()=>toggleSort(f)}>{l}{sort.field===f?(sort.dir==='asc'?' ↑':' ↓'):''}</th>
            ))}
            <th className="th" style={{textAlign:'right'}}>Actions</th>
          </tr></thead>
          <tbody>
            {paginated.length===0&&<tr><td colSpan={cols.length+1} style={{padding:48,textAlign:'center',color:'#94a3b8',fontSize:13}}>{records.length===0?'No absorption records yet. Click + Add Record to get started.':'No results match your filters.'}</td></tr>}
            {paginated.map((r,i)=>(
              <tr key={r.id} className="row-hover" style={{background:i%2===0?'#fff':'#fafafa'}}>
                <td className="td" style={{color:'#64748b',whiteSpace:'nowrap'}}>{r.dateEntered||'—'}</td>
                <td className="td" style={{fontWeight:500,color:'#334155'}}>{r.tenant||'—'}</td>
                <td className="td" style={{color:'#475569'}}>{r.landlord||'—'}</td>
                <td className="td" style={{color:'#475569'}}>{r.project||'—'}</td>
                <td className="td" style={{color:'#334155'}}>{r.address||'—'}</td>
                <td className="td"><span style={{fontWeight:600,color:'#0369a1'}}>{r.city||'—'}</span></td>
                <td className="td" style={{color:r.sqft?'#0e7c4a':'#cbd5e1',fontWeight:r.sqft?600:400}}>{r.sqft?fmtNum(r.sqft):'—'}</td>
                <td className="td">{r.leaseType?<span style={{background:'#f1f5f9',color:'#475569',padding:'2px 8px',borderRadius:4,fontSize:12,fontWeight:500}}>{r.leaseType}</span>:'—'}</td>
                <td className="td" style={{color:r.askingRent?'#b45309':'#cbd5e1',fontWeight:r.askingRent?600:400}}>{r.askingRent?'$'+r.askingRent+'/SF':'—'}</td>
                <td className="td" style={{color:r.dealRent?'#0e7c4a':'#cbd5e1',fontWeight:r.dealRent?600:400}}>{r.dealRent?'$'+r.dealRent+'/SF':'—'}</td>
                <td className="td" style={{color:'#475569'}}>{r.term?r.term+' mo':'—'}</td>
                <td className="td" style={{color:'#475569'}}>{r.tia?'$'+r.tia+'/SF':'—'}</td>
                <td className="td" style={{color:'#475569'}}>{r.deliveryDate||'—'}</td>
                <td className="td" style={{color:'#64748b',fontSize:12,maxWidth:200}}>{r.comments||'—'}</td>
                <td className="td" onClick={e=>e.stopPropagation()}>
                  <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                    <button className="btn btn-danger btn-sm" onClick={()=>{if(window.confirm('Delete this record?')){const updated=records.filter(x=>x.id!==r.id);setRecords(updated);persist(updated);}}}>Delete</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {totalPages>1&&(
        <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:16,alignItems:'center'}}>
          <button className="btn btn-ghost btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)}>← Previous</button>
          <span style={{fontSize:13,color:'#64748b',padding:'0 8px'}}>Page {page} of {totalPages}</span>
          <button className="btn btn-ghost btn-sm" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}>Next →</button>
        </div>
      )}
    </div>
  );
}

function NewsTab(){
  const CACHE_KEY='labmatrix_news_cache';

  function loadCache(){
    try{
      const c=localStorage.getItem(CACHE_KEY);
      if(!c)return null;
      return JSON.parse(c);
    }catch{return null;}
  }

  function saveCache(articles,lastFetched){
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({articles,lastFetched:lastFetched.toISOString()}));}catch{}
  }

  const cached=loadCache();
  const [articles,setArticles]=useState(cached?cached.articles:[]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [activeCat,setActiveCat]=useState('all');
  const [lastFetched,setLastFetched]=useState(cached?new Date(cached.lastFetched):null);
  const [expandedId,setExpandedId]=useState(null);

  async function fetchNews(cat='all'){
    setLoading(true);setError(null);setExpandedId(null);
    try{
      const response=await fetch('/api/news',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({category:cat})
      });
      const data=await response.json();
      const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      const clean=text.replace(/```json|```/g,'').trim();
      const s=clean.indexOf('['),e=clean.lastIndexOf(']');
      if(s===-1||e===-1)throw new Error('No data');
      const parsed=JSON.parse(clean.slice(s,e+1));
      setArticles(parsed);
      const now=new Date();
      setLastFetched(now);
      saveCache(parsed,now);
    }catch(err){
      setError('fetch');
    }
    setLoading(false);
  }

  useEffect(()=>{},[]);

  const displayed=activeCat==='all'?articles:articles.filter(a=>a.category===activeCat);

          <h1 style={{fontSize:22,fontWeight:700,color:'#0f172a',marginBottom:4}}>Bay Area Life Science News</h1>
          <p style={{fontSize:13,color:'#64748b'}}>Funding, layoffs, leadership, M&A, and breakthroughs — curated for outreach opportunities.</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>

            style={{padding:'8px 16px',fontSize:12,fontWeight:600,borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',color:'#475569',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:'inherit'}}>

            {loading?'Loading…':'Refresh'}
          </button>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {NEWS_CATEGORIES.map(c=>{
          const on=activeCat===c.key;
          return(<button key={c.key} onClick={()=>setActiveCat(c.key)}
            style={{padding:'6px 14px',fontSize:12,fontWeight:500,borderRadius:20,cursor:'pointer',transition:'all .15s',fontFamily:'inherit',
              background:on?'#0f172a':'#fff',color:on?'#fff':'#475569',border:'1px solid '+(on?'#0f172a':'#e2e8f0')}}>
            {c.label}
          </button>);
        })}
      </div>

      {error==='setup'&&(
        <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:32,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>🔑</div>
          <div style={{fontSize:15,fontWeight:600,color:'#0f172a',marginBottom:8}}>API Key Required</div>
          <div style={{fontSize:13,color:'#64748b',maxWidth:400,margin:'0 auto',lineHeight:1.6}}>
            Add your Anthropic API key to Vercel environment variables as <code style={{background:'#f1f5f9',padding:'2px 6px',borderRadius:4}}>REACT_APP_ANTHROPIC_KEY</code> to enable live news.
          </div>
        </div>
      )}

      {error==='fetch'&&(
        <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'16px 20px',color:'#dc2626',fontSize:13}}>
          Could not load news. Check your API key and try refreshing.
        </div>

          <div style={{fontSize:40,marginBottom:12}}>📰</div>

          <div style={{fontSize:13,color:'#64748b',marginBottom:20}}>Click Refresh to fetch the latest Bay Area life science news.</div>
        </div>
      )}

      {!loading&&!error&&articles.length>0&&displayed.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'#94a3b8',fontSize:14}}>No results in this category. Try another filter or click Refresh.</div>
      )}

      {!loading&&displayed.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
          {displayed.map((item,i)=>{
            const cat=CAT_COLORS[item.category]||{bg:'#f1f5f9',color:'#475569',icon:'📰'};
            const isExp=expandedId===i;
            return(
              <div key={i} onClick={()=>setExpandedId(isExp?null:i)}
                style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:20,cursor:'pointer',transition:'box-shadow .15s',boxShadow:isExp?'0 4px 20px rgba(0,0,0,.08)':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:10}}>
                  <span style={{fontSize:11,fontWeight:600,padding:'3px 8px',borderRadius:4,background:cat.bg,color:cat.color,whiteSpace:'nowrap'}}>{cat.icon} {(item.category||'news').toUpperCase()}</span>
                  <span style={{fontSize:11,color:'#94a3b8',whiteSpace:'nowrap',flexShrink:0}}>{item.date}</span>
                </div>
                <div style={{fontSize:14,fontWeight:600,color:'#0f172a',lineHeight:1.4,marginBottom:6}}>{item.title}</div>
                {item.company&&item.company!=='Multiple'&&<div style={{fontSize:12,color:'#0369a1',fontWeight:500,marginBottom:8}}>🏢 {item.company}</div>}
                {item.source&&<div style={{fontSize:11,color:'#94a3b8',marginBottom:6}}>📰 {item.source}</div>}
                <div style={{fontSize:12,color:'#64748b',lineHeight:1.6}}>
                  {isExp?item.summary:(item.summary||'').slice(0,100)+((item.summary||'').length>100?'…':'')}
                </div>
                {isExp&&item.relevance&&(
                  <div style={{marginTop:12,padding:'10px 12px',background:'#f0f9ff',borderRadius:6,borderLeft:'3px solid #0369a1'}}>
                    <div style={{fontSize:10,fontWeight:600,color:'#0369a1',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Broker Relevance</div>
                    <div style={{fontSize:12,color:'#0369a1',lineHeight:1.5}}>{item.relevance}</div>
                  </div>
                )}
                <div style={{marginTop:8,fontSize:11,color:'#94a3b8',textAlign:'right'}}>{isExp?'▲ Less':'▼ More'}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App(){
  const [listings,setListings]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState('dashboard');
  const [form,setForm]=useState(EMPTY);
  const [editId,setEditId]=useState(null);
  const [detailId,setDetailId]=useState(null);
  const [filters,setFilters]=useState({county:[],city:[],sqftType:[],feature:[],sfMin:'',sfMax:'',search:''});
  const [openDropdown,setOpenDropdown]=useState(null); // which dropdown is open
  const [sort,setSort]=useState({field:'city',dir:'asc'});
  const [page,setPage]=useState(1);
  const [delId,setDelId]=useState(null);
  const [toast,setToast]=useState(null);
  const [clientView,setClientView]=useState(false);
  const [classicView,setClassicView]=useState(false);
  const [viewOpen,setViewOpen]=useState(false);
  const PAGE_SIZE=50;

  useEffect(()=>{try{const s=localStorage.getItem(STORAGE_KEY);setListings(s?JSON.parse(s):IMPORTED_DATA);if(!s)localStorage.setItem(STORAGE_KEY,JSON.stringify(IMPORTED_DATA));}catch{setListings(IMPORTED_DATA);}setLoaded(true);},[]);
  useEffect(()=>{if(!openDropdown)return;const close=e=>{if(!e.target.closest('[data-dropdown]'))setOpenDropdown(null);};document.addEventListener('mousedown',close);return()=>document.removeEventListener('mousedown',close);},[openDropdown]);
  useEffect(()=>{if(!viewOpen)return;const close=e=>{if(!e.target.closest('[data-viewdrop]'))setViewOpen(false);};document.addEventListener('mousedown',close);return()=>document.removeEventListener('mousedown',close);},[viewOpen]);
  const persist=data=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch{}};
  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const filtered=listings.filter(r=>{
    if(filters.county.length&&!filters.county.includes(CITY_COUNTY[r.city]))return false;
    if(filters.city.length&&!filters.city.includes(r.city))return false;
    if(filters.sqftType.length&&!filters.sqftType.some(t=>r[t]))return false;
    if(filters.sfMin||filters.sfMax){const total=SQFT_TYPES.reduce((s,t)=>s+(Number(r[t.key])||0),0);if(filters.sfMin&&total<Number(filters.sfMin))return false;if(filters.sfMax&&total>Number(filters.sfMax))return false;}
    if(filters.feature.length&&!filters.feature.some(f=>(r.facilityFeatures||'').includes(f)))return false;
    if(filters.search){const s=filters.search.toLowerCase();if(![r.streetAddress,r.city,r.landlord,r.projectName,r.currentTenant,r.listingFirm,r.comments,r.listingContact].filter(Boolean).join(' ').toLowerCase().includes(s))return false;}
    return true;
  }).sort((a,b)=>{
    // Default sequence: SF → San Mateo → Santa Clara → Alameda → others, then by user sort within each group
    const COUNTY_ORDER={'San Francisco':0,'San Mateo':1,'Santa Clara':2,'Alameda':3};
    const aCounty=CITY_COUNTY[a.city]||'';
    const bCounty=CITY_COUNTY[b.city]||'';
    const aOrder=COUNTY_ORDER[aCounty]??99;
    const bOrder=COUNTY_ORDER[bCounty]??99;
    if(aOrder!==bOrder)return aOrder-bOrder;
    // Within same county, apply user sort
    let av=a[sort.field]??'',bv=b[sort.field]??'';
    if(['sqftDirect','sqftSublease','sqftPlanned','sqftTIReady','sqftUnderConstruction','pricingGuidance','avgTOM'].includes(sort.field)){av=Number(av)||0;bv=Number(bv)||0;}
    if(av<bv)return sort.dir==='asc'?-1:1;if(av>bv)return sort.dir==='asc'?1:-1;return 0;
  });

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const paginated=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
  const toggleSort=f=>{ setSort(s=>s.field===f?{field:f,dir:s.dir==='asc'?'desc':'asc'}:{field:f,dir:'asc'}); setPage(1); };
  const setFilter=(k,v)=>{ setFilters(f=>({...f,[k]:v})); setPage(1); };
  const toggleFilterVal=(k,v)=>{ setFilters(f=>{ const arr=f[k];const next=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];return {...f,[k]:next};}); setPage(1); };
  const toggleCounty=(county)=>{
    setFilters(f=>{
      const counties=f.county;
      const adding=!counties.includes(county);
      const newCounties=adding?[...counties,county]:counties.filter(c=>c!==county);
      // Cities belonging to this county
      const countyCities=Object.entries(CITY_COUNTY).filter(([,co])=>co===county).map(([city])=>city);
      let newCities=f.city;
      if(adding){
        // Add all cities from this county that aren't already selected
        newCities=[...new Set([...newCities,...countyCities])];
      } else {
        // Remove cities that belong to this county (and no other selected county)
        const remainingCounties=newCounties;
        newCities=newCities.filter(city=>{
          const cityCounty=CITY_COUNTY[city];
          return remainingCounties.includes(cityCounty);
        });
      }
      return {...f,county:newCounties,city:newCities};
    });
    setPage(1);
  };
  const clearFilters=()=>{ setFilters({county:[],city:[],sqftType:[],feature:[],sfMin:'',sfMax:'',search:''}); setOpenDropdown(null); setPage(1); };
  const openAdd=()=>{ setForm({...EMPTY}); setEditId(null); setView('form'); };
  const openEdit=id=>{ const r=listings.find(x=>x.id===id); setForm({...EMPTY,...r}); setEditId(id); setView('form'); };
  const openDetail=id=>{ setDetailId(id); setView('detail'); };
  const hfc=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleSubmit(){
    if(!form.city){showToast('City is required.','err');return;}
    if(!form.streetAddress&&!form.projectName&&!form.landlord){showToast('Need Address, Project Name, or Landlord.','err');return;}
    let updated;
    if(editId){updated=listings.map(r=>r.id===editId?{...form,id:editId}:r);showToast('Listing updated.');}
    else{updated=[...listings,{...form,id:newId()}];showToast('New listing added.');}
    setListings(updated);persist(updated);setView('table');
  }

  function confirmDelete(){const updated=listings.filter(r=>r.id!==delId);setListings(updated);persist(updated);setDelId(null);if(view==='detail')setView('table');showToast('Listing deleted.');}

  const CLIENT_COLS=['projectName','city','landlord','sqftDirect','sqftSublease','pricingGuidance','leaseType','deliveryTiming','comments'];
  const CLIENT_LABELS={projectName:'Project Name',city:'City',landlord:'Landlord',sqftDirect:'Direct SF',sqftSublease:'Sublease SF',pricingGuidance:'Pricing ($/SF)',leaseType:'Lease Type',deliveryTiming:'Delivery',comments:'Comments'};
  const ALL_COLS=['dateEntered','revisionDate','avgTOM','availabilityStatus','currentTenant','landlord','projectName','streetAddress','suiteFloor','city','state','sqftDirect','sqftSublease','sqftShadow','sqftTIReady','sqftUnderConstruction','sqftPlanned','divisibility','pricingGuidance','leaseType','tia','opexDollars','opexType','facilityFeatures','deliveryTiming','subleaseTerm','forSale','listingFirm','listingContact','comments'];
  // Classic view: all spreadsheet columns in exact spreadsheet order
  const CLASSIC_COLS=['dateEntered','revisionDate','avgTOM','availabilityStatus','currentTenant','landlord','projectName','streetAddress','suiteFloor','city','state','sqftDirect','sqftSublease','sqftShadow','sqftTIReady','sqftUnderConstruction','sqftPlanned','divisibility','pricingGuidance','leaseType','tia','opexDollars','opexType','facilityFeatures','deliveryTiming','subleaseTerm','forSale','listingFirm','listingContact','comments'];
  const CLASSIC_LABELS={dateEntered:'Date Entered',revisionDate:'Revision Date',avgTOM:'Avg TOM',availabilityStatus:'Avail. Status',currentTenant:'Current/Prev Tenant',landlord:'Landlord',projectName:'Project Name',streetAddress:'Street Address',suiteFloor:'Suite | Floor',city:'City',state:'State',sqftDirect:'Direct SF',sqftSublease:'Sublease SF',sqftShadow:'Shadow SF',sqftTIReady:'TI Ready SF',sqftUnderConstruction:'Under Const. SF',sqftPlanned:'Planned SF',divisibility:'Divisibility',pricingGuidance:'Pricing ($/SF)',leaseType:'Lease Type',tia:'TIA',opexDollars:'OpEx ($)',opexType:'OpEx Type',facilityFeatures:'Features',deliveryTiming:'Delivery',subleaseTerm:'Sublease Term',forSale:'For Sale',listingFirm:'Firm',listingContact:'Contact',comments:'Comments'};

  function exportCSV(){
    const cols=clientView?CLIENT_COLS:classicView?CLASSIC_COLS:ALL_COLS;
    const hdrs=clientView?cols.map(k=>CLIENT_LABELS[k]||k):classicView?cols.map(k=>CLASSIC_LABELS[k]||k):cols;
    const blob=new Blob([[hdrs.join(','),...filtered.map(r=>cols.map(k=>'"'+(r[k]??'').toString().replace(/"/g,'""')+'"').join(','))].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=clientView?'lab_spaces_client.csv':classicView?'lab_spaces_classic.csv':'bay_area_labs.csv';a.click();
    showToast('CSV exported.');
  }

  const detail=listings.find(r=>r.id===detailId);
  const stats={total:listings.length,withDirect:listings.filter(r=>r.sqftDirect).length,withSublease:listings.filter(r=>r.sqftSublease).length};
  const hasFilters=filters.county.length||filters.city.length||filters.sqftType.length||filters.feature.length||filters.sfMin||filters.sfMax||filters.search;

  if(!loaded)return(<div style={{background:'#f8fafc',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{width:32,height:32,border:'3px solid #e2e8f0',borderTopColor:'#0369a1',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 12px'}}/><div style={{fontSize:14,color:'#64748b'}}>Loading database…</div></div></div>);

  return(
    <div style={{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:'#f8fafc',minHeight:'100vh',color:'#0f172a'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .fade-up{animation:fadeUp .2s ease}
        .ifield{background:#fff;border:1px solid #e2e8f0;color:#0f172a;border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
        .ifield:focus{border-color:#0369a1;box-shadow:0 0 0 3px rgba(3,105,161,.1)}
        .ifield option{background:#fff}
        .th{cursor:pointer;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#64748b;text-align:left;user-select:none;white-space:nowrap}
        .th:hover{color:#0f172a}
        .td{padding:12px 14px;font-size:13px;color:#334155;border-top:1px solid #f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
        .btn{cursor:pointer;border-radius:8px;font-size:13px;font-weight:500;padding:8px 16px;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
        .btn-primary{background:#0369a1;color:#fff}.btn-primary:hover{background:#0284c7}
        .btn-success{background:#0e7c4a;color:#fff}.btn-success:hover{background:#15803d}
        .btn-ghost{background:#fff;color:#475569;border:1px solid #e2e8f0}.btn-ghost:hover{border-color:#94a3b8;color:#0f172a}
        .btn-danger{background:#fff;color:#dc2626;border:1px solid #fecaca}.btn-danger:hover{background:#fef2f2}
        .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
        .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px}
        .row-hover:hover{background:#f0f9ff !important;cursor:pointer}
        .sect-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
        .toast{animation:slideIn .2s ease;position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
      `}</style>

      {/* Top nav */}
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'0 28px',display:'flex',alignItems:'center',height:56,position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:32}}>
          <div style={{width:32,height:32,background:'#0369a1',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'#fff',fontSize:15,fontWeight:700}}>L</span>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:'#0f172a',lineHeight:1}}>Lab Matrix</div>
            <div style={{fontSize:11,color:'#94a3b8',lineHeight:1,marginTop:2}}>Bay Area</div>
          </div>
        </div>
        <div style={{display:'flex',gap:2,flex:1}}>
          {[['dashboard','Dashboard'],['table','Inventory'],['absorption','Absorption'],['news','News'],['query','AI Query']].map(([v,l])=>{
            const active=view===v||(view==='detail'&&v==='table')||(view==='form'&&v==='table');
            return(<button key={v} onClick={()=>setView(v)} style={{padding:'6px 14px',fontSize:13,fontWeight:500,border:'none',cursor:'pointer',borderRadius:6,background:active?'#f0f9ff':'transparent',color:active?'#0369a1':'#64748b',transition:'all .15s'}}>{l}</button>);
          })}
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div style={{display:'flex',gap:14,marginRight:8}}>
            {[['Listings',stats.total,'#0f172a'],['Direct',stats.withDirect,'#0e7c4a'],['Sublease',stats.withSublease,'#b45309']].map(([l,v,c])=>(
              <div key={l} style={{textAlign:'right'}}>
                <div style={{fontSize:16,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:10,color:'#94a3b8',letterSpacing:'.04em',textTransform:'uppercase'}}>{l}</div>
              </div>
            ))}
          </div>
          {view!=='query'&&view!=='news'&&view!=='absorption'&&<button className="btn btn-success" onClick={openAdd}>+ Add Listing</button>}
          {(view==='table'||view==='detail')&&<button className="btn btn-ghost" onClick={exportCSV}>↓ Export</button>}
          {view==='table'&&(
            <div data-viewdrop style={{position:'relative'}}>
              <button onClick={()=>setViewOpen(o=>!o)}
                style={{padding:'7px 14px',fontSize:13,fontWeight:500,borderRadius:8,display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontFamily:'inherit',border:'1px solid #e2e8f0',background:'#fff',color:'#475569'}}>
                <span style={{fontSize:12}}>{clientView?'👤':classicView?'⊞':'☰'}</span>
                {clientView?'Client View':classicView?'Classic View':'Default View'}
                <span style={{fontSize:9,color:'#94a3b8',marginLeft:2}}>{viewOpen?'▲':'▼'}</span>
              </button>
              {viewOpen&&(
                <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,zIndex:300,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,.1)',minWidth:180,overflow:'hidden'}}>
                  {[
                    {key:'default',label:'Default View',icon:'☰',desc:'Internal columns',active:!clientView&&!classicView,color:'#475569',bg:'#f8fafc',border:'#e2e8f0'},
                    {key:'client',label:'Client View',icon:'👤',desc:'8 client-friendly columns',active:clientView,color:'#16a34a',bg:'#f0fdf4',border:'#bbf7d0'},
                    {key:'classic',label:'Classic View',icon:'⊞',desc:'All spreadsheet columns',active:classicView,color:'#ea580c',bg:'#fff7ed',border:'#fed7aa'},
                  ].map(opt=>(
                    <div key={opt.key} onClick={()=>{
                      setClientView(opt.key==='client');
                      setClassicView(opt.key==='classic');
                      setViewOpen(false);
                    }} style={{padding:'10px 14px',cursor:'pointer',background:opt.active?opt.bg:'#fff',borderLeft:opt.active?`3px solid ${opt.color}`:'3px solid transparent',transition:'background .1s'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:14}}>{opt.icon}</span>
                        <div>
                          <div style={{fontSize:13,fontWeight:opt.active?600:400,color:opt.active?opt.color:'#334155'}}>{opt.label}</div>
                          <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{opt.desc}</div>
                        </div>
                        {opt.active&&<span style={{marginLeft:'auto',fontSize:11,color:opt.color,fontWeight:600}}>✓</span>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      <div style={{padding:'24px 16px',maxWidth:1600,margin:'0 auto'}}>

        {view==='dashboard'&&<div className="fade-up"><Dashboard/></div>}

        {view==='table'&&(
          <div className="fade-up">
            <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'14px 16px',marginBottom:16,display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
              <div style={{position:'relative',flex:'1 1 200px',maxWidth:260}}>
                <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#94a3b8',fontSize:13}}>🔍</span>
                <input className="ifield" style={{paddingLeft:32}} placeholder="Search address, landlord, tenant…" value={filters.search} onChange={e=>setFilter('search',e.target.value)}/>
              </div>
              {[
                {key:'county',opts:COUNTIES,ph:'All Counties'},
                {key:'city',opts:CITIES,ph:'All Cities'},
                {key:'sqftType',opts:SQFT_TYPES.map(t=>({value:t.key,label:t.label})),ph:'Space Type'},
                {key:'feature',opts:FEATURES_LIST,ph:'Feature'},
              ].map(({key,opts,ph})=>(
                <MultiSelect key={key} label={ph} options={opts} selected={filters[key]}
                  onToggle={v=>key==='county'?toggleCounty(v):toggleFilterVal(key,v)}
                  onClear={()=>key==='county'?setFilters(f=>({...f,county:[],city:[]})):setFilter(key,[])}
                  isOpen={openDropdown===key}
                  onOpen={()=>setOpenDropdown(o=>o===key?null:key)}/>
              ))}
              {/* SF Range dropdown */}
              <div data-dropdown style={{position:'relative',flex:'1 1 120px',maxWidth:180}}>
                <button onClick={()=>setOpenDropdown(o=>o==='sf'?null:'sf')} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',background:'#fff',border:'1px solid '+((filters.sfMin||filters.sfMax)?'#0369a1':'#e2e8f0'),borderRadius:8,padding:'8px 12px',cursor:'pointer',fontFamily:'inherit'}}>
                  <span style={{fontSize:13,color:(filters.sfMin||filters.sfMax)?'#0369a1':'#94a3b8',fontWeight:(filters.sfMin||filters.sfMax)?600:400}}>
                    {filters.sfMin||filters.sfMax?`${filters.sfMin?Number(filters.sfMin).toLocaleString():'0'} – ${filters.sfMax?Number(filters.sfMax).toLocaleString():'Any'} SF`:'SF Range'}
                  </span>
                  <span style={{color:'#94a3b8',fontSize:10,marginLeft:6}}>{openDropdown==='sf'?'▲':'▼'}</span>
                </button>
                {openDropdown==='sf'&&(
                  <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:300,background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:16,boxShadow:'0 4px 20px rgba(0,0,0,.1)',minWidth:220}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>SF Range</div>
                    <div style={{display:'flex',flexDirection:'column',gap:10}}>
                      <div>
                        <label style={{fontSize:12,color:'#475569',fontWeight:500,display:'block',marginBottom:4}}>Min SF</label>
                        <input className="ifield" type="number" placeholder="e.g. 2800" value={filters.sfMin} onChange={e=>setFilter('sfMin',e.target.value)} min="0" autoFocus/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:'#475569',fontWeight:500,display:'block',marginBottom:4}}>Max SF</label>
                        <input className="ifield" type="number" placeholder="e.g. 7500" value={filters.sfMax} onChange={e=>setFilter('sfMax',e.target.value)} min="0"/>
                      </div>
                      <div style={{display:'flex',gap:8,marginTop:4}}>
                        <button className="btn btn-primary" style={{flex:1,justifyContent:'center',fontSize:12,padding:'6px'}} onClick={()=>setOpenDropdown(null)}>Apply</button>
                        {(filters.sfMin||filters.sfMax)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setFilter('sfMin','');setFilter('sfMax','');}}>Clear</button>}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              {hasFilters&&<button className="btn btn-ghost btn-sm" onClick={clearFilters}>✕ Clear</button>}
              <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,color:'#94a3b8',whiteSpace:'nowrap'}}>{filtered.length} results</span>
                {totalPages>1&&(<>
                  <div style={{width:1,height:14,background:'#e2e8f0'}}/>
                  <button className="btn btn-ghost btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)} style={{padding:'3px 8px',fontSize:13,lineHeight:1}}>←</button>
                  <span style={{fontSize:12,color:'#64748b',whiteSpace:'nowrap'}}>{page} / {totalPages}</span>
                  <button className="btn btn-ghost btn-sm" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)} style={{padding:'3px 8px',fontSize:13,lineHeight:1}}>→</button>
                </>)}
              </div>
            </div>
            <div className="card" style={{overflow:'auto'}}>
              {clientView&&(
                <div style={{background:'#e0f2fe',borderBottom:'1px solid #bae6fd',padding:'8px 16px',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:'#0369a1',fontWeight:600}}>👤 Client View</span>
                  <span style={{fontSize:12,color:'#16a34a'}}>— showing client-friendly columns only. Export will reflect this view.</span>
                </div>
              )}
              {classicView&&(
                <div style={{background:'#ede9fe',borderBottom:'1px solid #ddd6fe',padding:'8px 16px',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:'#7c3aed',fontWeight:600}}>⊞ Classic View</span>
                  <span style={{fontSize:12,color:'#ea580c'}}>— all columns in spreadsheet order, grouped by county. Export will reflect this view.</span>
                </div>
              )}
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{background:'#f8fafc'}}>
                  {(clientView
                    ? [['projectName','Project Name'],['city','City'],['landlord','Landlord'],['sqftDirect','Direct SF'],['sqftSublease','Sublease SF'],['pricingGuidance','Pricing'],['leaseType','Lease Type'],['deliveryTiming','Delivery']]
                    : classicView
                    ? CLASSIC_COLS.map(k=>[k,CLASSIC_LABELS[k]||k])
                    : [['dateEntered','Date Added'],['revisionDate','Revised'],['avgTOM','TOM (Mo)'],['currentTenant','Tenant'],['landlord','Landlord'],['streetAddress','Address'],['city','City'],['sqftDirect','Direct SF'],['sqftSublease','Sublease SF'],['sqftPlanned','Planned SF'],['pricingGuidance','Pricing'],['leaseType','Lease'],['deliveryTiming','Delivery'],['listingFirm','Firm']]
                  ).map(([f,l])=>(
                    <th key={f} className="th" onClick={()=>toggleSort(f)}>{l}{sort.field===f?(sort.dir==='asc'?' ↑':' ↓'):''}</th>
                  ))}
                  {!clientView&&!classicView&&<th className="th" style={{textAlign:'right'}}>Actions</th>}
                </tr></thead>
                <tbody>
                  {paginated.length===0&&<tr><td colSpan={12} style={{padding:48,textAlign:'center',color:'#94a3b8',fontSize:13}}>{listings.length===0?'No listings yet.':'No results match your filters.'}</td></tr>}
                  {paginated.map((r,i)=>(
                    <tr key={r.id} className="row-hover" style={{background:i%2===0?'#fff':'#fafafa'}} onClick={()=>openDetail(r.id)}>
                      {clientView ? (<>
                        <td className="td" style={{fontWeight:500,color:'#334155'}}>{r.projectName||r.streetAddress||'—'}</td>
                        <td className="td"><span style={{fontWeight:600,color:'#0369a1'}}>{r.city||'—'}</span></td>
                        <td className="td" style={{color:'#475569',fontWeight:500}}>{r.landlord||'—'}</td>
                        <td className="td"><span style={{color:r.sqftDirect?'#0e7c4a':'#cbd5e1',fontWeight:r.sqftDirect?600:400}}>{r.sqftDirect?fmtNum(r.sqftDirect):'—'}</span></td>
                        <td className="td"><span style={{color:r.sqftSublease?'#b45309':'#cbd5e1',fontWeight:r.sqftSublease?600:400}}>{r.sqftSublease?fmtNum(r.sqftSublease):'—'}</span></td>
                        <td className="td" style={{fontWeight:r.pricingGuidance?600:400,color:r.pricingGuidance?'#b45309':'#cbd5e1'}}>{r.pricingGuidance?'$'+r.pricingGuidance+'/SF':'—'}</td>
                        <td className="td">{r.leaseType?<span style={{background:'#f1f5f9',color:'#475569',padding:'2px 8px',borderRadius:4,fontSize:12,fontWeight:500}}>{r.leaseType}</span>:'—'}</td>
                        <td className="td" style={{color:'#475569'}}>{r.deliveryTiming||'—'}</td>
                        <td className="td" style={{color:'#64748b',fontSize:12,maxWidth:220}}>{r.comments||'—'}</td>
                      </>) : classicView ? (<>
                        {CLASSIC_COLS.map(k=>(
                          <td key={k} className="td" style={{color:'#475569',fontSize:12}}>{
                            k==='dateEntered'||k==='revisionDate'?fmtDate(r[k]):
                            k==='sqftDirect'?<span style={{color:r[k]?'#0e7c4a':'#cbd5e1',fontWeight:r[k]?600:400}}>{r[k]?fmtNum(r[k]):'—'}</span>:
                            k==='sqftSublease'?<span style={{color:r[k]?'#b45309':'#cbd5e1',fontWeight:r[k]?600:400}}>{r[k]?fmtNum(r[k]):'—'}</span>:
                            k==='city'?<span style={{fontWeight:600,color:'#0369a1'}}>{r[k]||'—'}</span>:
                            k==='pricingGuidance'?<span style={{color:r[k]?'#b45309':'#cbd5e1',fontWeight:r[k]?600:400}}>{r[k]?'$'+r[k]+'/SF':'—'}</span>:
                            k==='leaseType'&&r[k]?<span style={{background:'#f1f5f9',color:'#475569',padding:'2px 6px',borderRadius:3,fontSize:11}}>{r[k]}</span>:
                            (r[k]!=null&&r[k]!==''?String(r[k]):'—')
                          }</td>
                        ))}
                      </>) : (<>
                        <td className="td" style={{color:'#64748b',whiteSpace:'nowrap'}}>{fmtDate(r.dateEntered)}</td>
                        <td className="td" style={{color:'#64748b',whiteSpace:'nowrap'}}>{fmtDate(r.revisionDate)}</td>
                        <td className="td" style={{color:r.avgTOM>0?'#0369a1':'#cbd5e1',fontWeight:r.avgTOM>0?600:400,textAlign:'right'}}>{r.avgTOM!=null&&r.avgTOM>0?Number(r.avgTOM).toFixed(1):'—'}</td>
                        <td className="td" style={{color:'#64748b'}}>{r.currentTenant||'—'}</td>
                        <td className="td" style={{color:'#475569',fontWeight:500}}>{r.landlord||'—'}</td>
                        <td className="td" style={{color:'#334155'}}>{[r.streetAddress,r.suiteFloor].filter(Boolean).join(' ')||r.projectName||'—'}</td>
                        <td className="td"><span style={{fontWeight:600,color:'#0369a1'}}>{r.city||'—'}</span></td>
                        <td className="td"><span style={{color:r.sqftDirect?'#0e7c4a':'#cbd5e1',fontWeight:r.sqftDirect?600:400}}>{r.sqftDirect?fmtNum(r.sqftDirect):'—'}</span></td>
                        <td className="td"><span style={{color:r.sqftSublease?'#b45309':'#cbd5e1',fontWeight:r.sqftSublease?600:400}}>{r.sqftSublease?fmtNum(r.sqftSublease):'—'}</span></td>
                        <td className="td"><span style={{color:r.sqftPlanned?'#475569':'#cbd5e1',fontWeight:r.sqftPlanned?600:400}}>{r.sqftPlanned?fmtNum(r.sqftPlanned):'—'}</span></td>
                        <td className="td" style={{fontWeight:r.pricingGuidance?600:400,color:r.pricingGuidance?'#b45309':'#cbd5e1'}}>{r.pricingGuidance?'$'+r.pricingGuidance+'/SF':'—'}</td>
                        <td className="td">{r.leaseType?<span style={{background:'#f1f5f9',color:'#475569',padding:'2px 8px',borderRadius:4,fontSize:12,fontWeight:500}}>{r.leaseType}</span>:'—'}</td>
                        <td className="td" style={{color:'#475569'}}>{r.deliveryTiming||'—'}</td>
                        <td className="td" style={{color:'#64748b'}}>{r.listingFirm||'—'}</td>
                        <td className="td" onClick={e=>e.stopPropagation()}>
                          <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                            <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(r.id)}>Edit</button>
                            <button className="btn btn-danger btn-sm" onClick={()=>setDelId(r.id)}>Delete</button>
                          </div>
                        </td>
                      </>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {totalPages>1&&(
              <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:16,alignItems:'center'}}>
                <button className="btn btn-ghost btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)}>← Previous</button>
                <span style={{fontSize:13,color:'#64748b',padding:'0 8px'}}>Page {page} of {totalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}>Next →</button>
              </div>
            )}
          </div>
        )}

        {view==='form'&&(
          <div className="fade-up" style={{maxWidth:860}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <button className="btn btn-ghost" onClick={()=>setView('table')}>← Back</button>
              <h1 style={{fontSize:20,fontWeight:700,color:'#0f172a'}}>{editId?'Edit Listing':'Add New Listing'}</h1>
            </div>
            <div className="card" style={{padding:28}}>
              {[{title:'Property Info',fields:['landlord','projectName','streetAddress','suiteFloor','city','state','currentTenant','availabilityStatus','dateEntered','revisionDate','avgTOM']},{title:'Available Sq Ft',fields:['sqftDirect','sqftSublease','sqftShadow','sqftTIReady','sqftUnderConstruction','sqftPlanned','divisibility']},{title:'Pricing & Lease',fields:['pricingGuidance','leaseType','tia','opexDollars','opexType']},{title:'Facility & Delivery',fields:['facilityFeatures','deliveryTiming','subleaseTerm','forSale']},{title:'Listing Agents',fields:['listingFirm','listingContact']},{title:'Notes & Links',fields:['comments','marketingFlyer','propertyPic']}].map((section,si)=>(
                <div key={section.title} style={{marginBottom:28,paddingBottom:si<5?28:0,borderBottom:si<5?'1px solid #f1f5f9':'none'}}>
                  <div className="sect-label">{section.title}</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                    {section.fields.map(k=>{
                      const isWide=['comments','streetAddress','availabilityStatus','marketingFlyer','propertyPic'].includes(k);
                      return(
                        <div key={k} style={{gridColumn:isWide?'1/-1':'auto'}}>
                          <label style={{display:'block',fontSize:12,fontWeight:500,color:'#475569',marginBottom:6}}>{LABELS[k]||k}</label>
                          {k==='city'?(<select className="ifield" value={form[k]||''} onChange={e=>hfc(k,e.target.value)}><option value="">Select city…</option>{CITIES.map(c=><option key={c}>{c}</option>)}</select>)
                          :k==='leaseType'?(<select className="ifield" value={form[k]||''} onChange={e=>hfc(k,e.target.value)}><option value="">Select…</option>{LEASE_TYPES.map(l=><option key={l}>{l}</option>)}</select>)
                          :k==='deliveryTiming'?(<select className="ifield" value={form[k]||''} onChange={e=>hfc(k,e.target.value)}><option value="">Select…</option>{DELIVERY_OPTIONS.map(d=><option key={d}>{d}</option>)}</select>)
                          :k==='comments'?(<textarea className="ifield" rows={4} style={{resize:'vertical'}} value={form[k]||''} onChange={e=>hfc(k,e.target.value)}/>)
                          :k==='facilityFeatures'?(<div style={{display:'flex',flexWrap:'wrap',gap:8,paddingTop:4}}>{FEATURES_LIST.map(f=>{const active=(form[k]||'').includes(f);return(<button key={f} type="button" onClick={()=>{const cur=(form[k]||'').split(', ').filter(Boolean);const next=cur.includes(f)?cur.filter(x=>x!==f):[...cur,f];hfc(k,next.join(', '));}} style={{padding:'6px 14px',fontSize:13,borderRadius:8,cursor:'pointer',fontWeight:500,border:'1px solid '+(active?'#0369a1':'#e2e8f0'),background:active?'#e0f2fe':'#fff',color:active?'#0369a1':'#64748b'}}>{f}</button>);})}</div>)
                          :(<input className="ifield" type={['dateEntered','revisionDate'].includes(k)?'date':['sqftDirect','sqftSublease','sqftShadow','sqftTIReady','sqftUnderConstruction','sqftPlanned','avgTOM','tia','opexDollars'].includes(k)?'number':'text'} value={form[k]||''} onChange={e=>hfc(k,e.target.value)}/>)}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button className="btn btn-ghost" onClick={()=>setView('table')}>Cancel</button>
                <button className="btn btn-primary" onClick={handleSubmit}>{editId?'Save Changes':'Add Listing'}</button>
              </div>
            </div>
          </div>
        )}

        {view==='detail'&&detail&&(
          <div className="fade-up" style={{maxWidth:720}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:20}}>
              <button className="btn btn-ghost" onClick={()=>setView('table')}>← Back</button>
              <div style={{flex:1}}>
                <h1 style={{fontSize:20,fontWeight:700,color:'#0f172a'}}>{detail.streetAddress||detail.projectName||detail.landlord||'Listing Detail'}</h1>
                {detail.city&&<div style={{fontSize:14,color:'#0369a1',marginTop:3,fontWeight:500}}>{detail.city}, {detail.state||'CA'}</div>}
              </div>
              <button className="btn btn-ghost" onClick={()=>openEdit(detail.id)}>Edit</button>
              <button className="btn btn-danger" onClick={()=>setDelId(detail.id)}>Delete</button>
            </div>
            <div className="card" style={{padding:24}}>
              <div style={{marginBottom:20}}>
                <div className="sect-label">Available Sq Ft</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                  {SQFT_TYPES.map(t=>detail[t.key]?(<div key={t.key} style={{background:'#f8fafc',border:'1px solid '+t.color+'33',borderRadius:8,padding:'10px 16px',borderLeft:'3px solid '+t.color}}><div style={{fontSize:11,color:'#64748b',fontWeight:500,marginBottom:2}}>{t.label}</div><div style={{fontSize:16,fontWeight:700,color:t.color}}>{fmtNum(detail[t.key])} SF</div></div>):null)}
                  {!SQFT_TYPES.some(t=>detail[t.key])&&<span style={{color:'#94a3b8',fontSize:13}}>No square footage data</span>}
                </div>
              </div>
              {detail.facilityFeatures&&(<div style={{marginBottom:20}}><div className="sect-label">Facility Features</div><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{detail.facilityFeatures.split(',').map(f=>(<span key={f} style={{background:'#e0f2fe',color:'#0c4a6e',padding:'4px 12px',borderRadius:6,fontSize:13,fontWeight:500}}>{f.trim()}</span>))}</div></div>)}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
                {[['Landlord',detail.landlord],['Current/Prev Tenant',detail.currentTenant],['Project Name',detail.projectName],['Suite / Floor',detail.suiteFloor],['Pricing Guidance',detail.pricingGuidance?'$'+detail.pricingGuidance+'/SF/mo':null],['Lease Type',detail.leaseType],['TIA',detail.tia?'$'+fmtNum(detail.tia):null],['OpEx',detail.opexDollars?'$'+fmtNum(detail.opexDollars)+' '+(detail.opexType||''):null],['Divisibility',detail.divisibility],['Delivery Timing',detail.deliveryTiming],['Sublease Term',detail.subleaseTerm],['For Sale',detail.forSale],['Listing Firm',detail.listingFirm],['Listing Contact',detail.listingContact],['Avail. Status',detail.availabilityStatus],['Avg TOM',detail.avgTOM!=null?Number(detail.avgTOM).toFixed(1)+' months':null],['Date Entered',fmtDate(detail.dateEntered)],['Revision Date',fmtDate(detail.revisionDate)]].filter(([,v])=>v).map(([label,val])=>(
                  <div key={label} style={{padding:'10px 0',borderBottom:'1px solid #f8fafc'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:3}}>{label}</div>
                    <div style={{fontSize:13,color:'#334155',fontWeight:500}}>{val}</div>
                  </div>
                ))}
              </div>
              {detail.comments&&(<div style={{marginTop:20,padding:'14px 16px',background:'#f8fafc',borderRadius:8,borderLeft:'3px solid #e2e8f0'}}><div style={{fontSize:11,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Comments</div><div style={{fontSize:13,color:'#475569',lineHeight:1.7}}>{detail.comments}</div></div>)}
              {(detail.marketingFlyer||detail.propertyPic)&&(<div style={{marginTop:16,display:'flex',gap:10}}>{detail.marketingFlyer&&<a href={detail.marketingFlyer} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">↗ Marketing Flyer</a>}{detail.propertyPic&&<a href={detail.propertyPic} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">↗ Property Photo</a>}</div>)}
            </div>
          </div>
        )}

        {view==='absorption'&&(
          <AbsorptionTab/>
        )}

        {view==='news'&&(
          <NewsTab/>
        )}

        {view==='query'&&(
          <div className="fade-up" style={{maxWidth:760}}>
            <h1 style={{fontSize:20,fontWeight:700,color:'#0f172a',marginBottom:4}}>AI Query</h1>
            <p style={{fontSize:13,color:'#64748b',marginBottom:20}}>Ask natural language questions across all {listings.length} listings.</p>
            <AIQueryTab listings={listings}/>
          </div>
        )}
      </div>

      {delId&&(
        <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999}} onClick={()=>setDelId(null)}>
          <div className="card fade-up" style={{padding:28,maxWidth:380,width:'90%',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{width:44,height:44,background:'#fef2f2',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:20}}>⚠</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>Delete this listing?</div>
            <div style={{color:'#64748b',fontSize:13,marginBottom:24,lineHeight:1.6}}>This cannot be undone.</div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={confirmDelete}>Delete listing</button>
            </div>
          </div>
        </div>
      )}

      {toast&&(<div className="toast" style={{background:toast.type==='err'?'#fef2f2':'#f0fdf4',border:'1px solid '+(toast.type==='err'?'#fecaca':'#bbf7d0'),color:toast.type==='err'?'#dc2626':'#15803d'}}><span style={{fontSize:16}}>{toast.type==='err'?'✕':'✓'}</span>{toast.msg}</div>)}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
